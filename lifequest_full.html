<!-- Inline SVG icon as data URL for apple-touch-icon fallback -->
<script>
// Generate icons and register service worker
(function(){
  // Draw a cute icon on canvas and store as PNG
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    // Background gradient
    const g=ctx.createRadialGradient(size*.5,size*.4,0,size*.5,size*.5,size*.6);
    g.addColorStop(0,'#a29bfe');g.addColorStop(1,'#6c5ce7');
    ctx.fillStyle=g;
    // Rounded rect
    const r=size*.22;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();ctx.fill();
    // Sparkle dots
    [[.18,.18,'#fff',.7],[.82,.18,'#fd79a8',.8],[.18,.82,'#00cec9',.7],[.82,.82,'#f9a825',.8]].forEach(([x,y,c,a])=>{
      ctx.globalAlpha=a;ctx.fillStyle=c;ctx.beginPath();
      ctx.arc(x*size,y*size,size*.045,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    // Star / sword icon in center
    ctx.font=`${size*.45}px serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚔️',size*.5,size*.52);
    // "LQ" text at bottom
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font=`900 ${size*.13}px Nunito,sans-serif`;
    ctx.fillText('LIFE QUEST',size*.5,size*.86);
    return c.toDataURL('image/png');
  }
  window._iconMaker=makeIcon;
})();
</script>

body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(70px);opacity:0.28;}

.hdr{text-align:center;padding:1rem 0 .8rem;margin-bottom:.8rem;}

.hdr-title{font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;color:var(--accent);}

.rbtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 11px;background:var(--panel);border:2px solid var(--border);border-radius:14px;cursor:pointer;min-width:70px;transition:all .2s;font-family:'Nunito',sans-serif;box-shadow:0 2px 8px var(--shadow);}

.r-ico{font-size:24px;line-height:1;}.r-lbl{font-size:9px;font-weight:800;color:var(--text2);text-align:center;}
.rbtn.active .r-lbl{color:var(--accent);}
.cstrip{display:flex;align-items:center;gap:12px;margin-bottom:10px;background:var(--panel2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;}

.cs-rl{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:4px;}
.cs-bw{display:flex;align-items:center;gap:8px;}

.empty{text-align:center;padding:1.5rem 1rem;color:var(--text3);font-size:13px;font-weight:600;}
.ei{font-size:32px;margin-bottom:8px;display:block;}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--accent);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:800;font-family:'Nunito',sans-serif;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 6px 20px rgba(108,92,231,.4);}
.toast.show{transform:translateX(-50%) translateY(0);}
.moverlay{position:fixed;inset:0;background:rgba(26,20,64,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.moverlay.show{opacity:1;pointer-events:all;}
.mbox{background:var(--panel);border:3px solid var(--gold);border-radius:20px;padding:1.8rem;text-align:center;max-width:310px;width:90%;box-shadow:0 20px 60px rgba(108,92,231,.3);animation:mPop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes mPop{from{transform:scale(.6);opacity:0;}to{transform:scale(1);opacity:1;}}
.mspr{font-size:52px;display:block;animation:mflt 2s ease-in-out infinite;margin-bottom:8px;}
@keyframes mflt{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.mtitle{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--gold2);margin-bottom:5px;}
.msub{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.mrwd{background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--accent);font-weight:800;margin-bottom:10px;}
.maff{font-size:11px;color:var(--text2);font-style:italic;line-height:1.7;margin-bottom:14px;}
.mclose{background:linear-gradient(135deg,var(--gold2),var(--gold));color:var(--text);border:none;border-radius:10px;padding:10px 26px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif;}

function lvX(sk){return lvFx(sk?.xp||0);}
function titleFor(lv){return TITLES[Math.min(lv-1,TITLES.length-1)];}
function skById(id){return ALL_SKILLS.find(s=>s.id===id)||SENSEI_SKILLS.find(s=>s.id===id)||{nm:id,ico:'⭐',bar:'#ccc'};}

function isDone(q){return(q.type==='daily'||q.type==='habit')?q.lastDone===today():!!q.done;}
function fmtRp(n){return'Rp '+Math.round(n||0).toLocaleString('id-ID');}
function rnd(){return 'q'+Date.now()+Math.floor(Math.random()*99999);}

function chkStreak(){
  const t=today();if(S.lastActive===t)return;
  const y=new Date(Date.now()-86400000).toDateString();
  S.streak=(S.lastActive===y)?(S.streak||0)+1:1;
  S.lastActive=t;S.doneToday=0;saveS();
}

function evalAch(){
  const nw=[];
  ACHS.forEach(a=>{
    if(!S.achievements[a.id]){let ok=false;try{ok=a.req(S);}catch(e){}
      if(ok){S.achievements[a.id]=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});nw.push(a);}}
  });
  if(nw.length){saveS();nw.forEach((a,i)=>setTimeout(()=>showToast(`🏆 ${a.nm}: ${a.dsc}`),i*700));}
}

// Simple seed - no locking, sorted by ord
function seed(){
  if(S.quests.length>0)return;
  S.quests=QUEST_CATALOG.map(c=>({
    id:rnd(),catalogId:c.id,nm:c.nm,type:c.type,sk:c.sk,xp:c.xp,
    role:c.role,ord:c.ord||99,done:false,lastDone:null,surprise:false,
  }));
  saveS();
}

function syncCatalogQuests(){
  const existing=new Set(S.quests.map(q=>q.catalogId).filter(Boolean));
  let added=0;
  QUEST_CATALOG.forEach(c=>{
    if(existing.has(c.id))return;
    S.quests.push({id:rnd(),catalogId:c.id,nm:c.nm,type:c.type,sk:c.sk,xp:c.xp,
      role:c.role,ord:c.ord||99,done:false,lastDone:null,surprise:false});
    added++;
  });
  if(added>0){saveS();showToast(`✨ ${added} new quest${added>1?'s':''} added!`);}
}

// ── Quest card helper (must be before all render functions) ──
window._qmap={};
function qCard(q,type){
  const done=isDone(q),sk=skById(q.sk);
  const sid=q.id.replace(/[^a-z0-9]/gi,'_');
  window._qmap[sid]=q.id;
  return`<div class="qcard${done?' done':''}">
    <div class="qchk" onclick="handleQCheck('${sid}')">${done?'✓':''}</div>
    <div class="qbody" onclick="handleQCheck('${sid}')">
      <div class="qnm">${q.nm}${q.surprise?'<span class="sbdg">★ SURPRISE</span>':''}</div>
      <div class="qmeta"><span class="qbdg b${(type||'q')[0]}">${type}</span><span class="qsk">${sk.ico} ${sk.nm}</span></div>
    </div>
    <div class="qr" onclick="event.stopPropagation()">
      <span class="qxp">+${q.xp}</span>
      ${done?`<button class="dbtn" title="Undo" onclick="handleQUndo('${sid}')" style="color:var(--accent);font-size:14px;">↩</button>`:''}
      <button class="dbtn" title="Delete" onclick="handleQDel('${sid}','${encodeURIComponent(q.nm)}')">🗑</button>
    </div>
  </div>`;
}
function handleQCheck(sid){const id=window._qmap[sid];if(id)toggleQ(id);}
function handleQUndo(sid){const id=window._qmap[sid];if(id)undoQ(id);}
function handleQDel(sid,nm){
  const id=window._qmap[sid];if(!id)return;
  if(window.confirm('Delete quest:\n"'+decodeURIComponent(nm)+'"\n\nThis cannot be undone.'))delQ(id);
}

function drawPenta(sks,gXp,color){
  const cv=document.getElementById('pc');if(!cv)return;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=Math.min(W,H)/2-28,n=sks.length;
  if(n<3)return;ctx.clearRect(0,0,W,H);
  const ang=i=>(2*Math.PI*i/n)-Math.PI/2;
  const pt=(i,r)=>({x:cx+r*Math.cos(ang(i)),y:cy+r*Math.sin(ang(i))});
  ctx.beginPath();ctx.arc(cx,cy,R+8,0,Math.PI*2);ctx.fillStyle='rgba(108,92,231,.04)';ctx.fill();
  [.25,.5,.75,1].forEach(f=>{ctx.beginPath();for(let i=0;i<n;i++){const p=pt(i,R*f);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}ctx.closePath();ctx.strokeStyle=f===1?'rgba(108,92,231,.2)':'rgba(108,92,231,.1)';ctx.lineWidth=f===1?1.5:1;ctx.stroke();});
  for(let i=0;i<n;i++){const p=pt(i,R);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.strokeStyle='rgba(108,92,231,.15)';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  for(let i=0;i<n;i++){const xp=gXp(sks[i]),lv=lvFx(xp),v=Math.min(((lv-1)*10+xpIn(xp)/XPL*10)/100,1),p=pt(i,R*Math.max(v,.05));i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
  ctx.closePath();ctx.fillStyle=color+'44';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
  for(let i=0;i<n;i++){const xp=gXp(sks[i]),lv=lvFx(xp),v=Math.min(((lv-1)*10+xpIn(xp)/XPL*10)/100,1),p=pt(i,R*Math.max(v,.05));ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle='white';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();}
  ctx.font='bold 8px Nunito,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<n;i++){const p=pt(i,R+20);ctx.fillStyle='#5a4fa0';ctx.fillText((sks[i].nm||'').slice(0,7)+' L'+lvFx(gXp(sks[i])),p.x,p.y);}
}

function addQuest(type){

  const sk=document.getElementById('qs')?.value,xp=parseInt(document.getElementById('qx')?.value||10);
  S.quests.push({id:rnd(),nm,type,sk,xp,role:CR.id,done:false,lastDone:null,surprise:false});

function toggleQ(id){
  const q=S.quests.find(x=>x.id==id);if(!q||isDone(q))return;
  const prev=lvFx(S.totalXp);
  if(q.type==='daily'||q.type==='habit')q.lastDone=today();else q.done=true;
  S.totalXp+=q.xp;
  const isSk=SENSEI_SKILLS.find(s=>s.id===q.sk);
  if(isSk){if(!S.sskills[q.sk])S.sskills[q.sk]={xp:0};S.sskills[q.sk].xp+=q.xp;}
  else{if(!S.skills[q.sk])S.skills[q.sk]={xp:0};S.skills[q.sk].xp+=q.xp;}
  S.doneToday=(S.doneToday||0)+1;
  const sk=skById(q.sk);
  // Daily tracker: increment cumulative count
  if(q.type==='daily'&&q.catalogId&&DAILY_TRACKER[q.catalogId]){
    if(!S.dailyCounts)S.dailyCounts={};
    const cfg=DAILY_TRACKER[q.catalogId];
    const inc=cfg.unit==='min'?30:1; // guitar = 30 min, others = 1 day
    S.dailyCounts[q.catalogId]=(S.dailyCounts[q.catalogId]||0)+inc;
  }
  // Only add to log for non-daily quests
  if(q.type!=='daily'){
    S.log.push({nm:q.nm,type:q.type,sk:sk.nm,ico:sk.ico,xp:q.xp,sur:q.surprise||false,catalogId:q.catalogId||null,
      time:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});
  }
  chkStreak();saveS();evalAch();syncCatalogQuests();
  const newLv=lvFx(S.totalXp);renderAll();
  if(newLv>prev)showLvlUp(newLv);else showToast(`${sk.ico} +${q.xp} XP · ${sk.nm}!`);
}

function delQ(id){S.quests=S.quests.filter(q=>q.id!=id);saveS();renderMain();}
function confirmDelQ(id,nm){
  if(window.confirm(`Delete quest:\n"${nm}"\n\nThis cannot be undone.`)){delQ(id);}
}

function trainSkill(){
  const isSn=CR.id==='teacher',id=document.getElementById('tsk')?.value,xp=parseInt(document.getElementById('txp')?.value||10);
  const prev=lvFx(S.totalXp);
  if(isSn){if(!S.sskills[id])S.sskills[id]={xp:0};S.sskills[id].xp+=xp;
    if(document.getElementById('tppt')?.checked)S.pptMade=(S.pptMade||0)+1;
    if(document.getElementById('tpromo')?.checked)S.promoPosted=(S.promoPosted||0)+1;}
  else{if(!S.skills[id])S.skills[id]={xp:0};S.skills[id].xp+=xp;}
  S.totalXp+=xp;saveS();evalAch();
  const newLv=lvFx(S.totalXp),sk=skById(id);renderAll();
  if(newLv>prev)showLvlUp(newLv);else showToast(`${sk.ico} +${xp} XP · ${sk.nm}!`);
}

function rollSurprise(){
  const sq=SURPRISE_QUESTS[Math.floor(Math.random()*SURPRISE_QUESTS.length)];
  if(S.quests.find(q=>q.nm===sq.nm&&!isDone(q))){showToast('Already have this!');return;}
  S.quests.push({id:rnd(),nm:sq.nm,type:'quest',sk:sq.sk,xp:sq.xp,role:'rui',done:false,lastDone:null,surprise:true});
  saveS();renderMain();showToast('🎲 Surprise quest added!');
}

function addOrbs(n){S.orbs=Math.min((S.orbs||0)+n,S.orbGoal);if(S.orbs>=S.orbGoal){S.orbFills=(S.orbFills||0)+1;saveS();evalAch();showToast('🎉 Bowl full! Gift your viewers!');renderMain();}else{saveS();renderMain();}}
function resetOrbs(){S.orbs=0;saveS();renderMain();showToast('New bowl starts! 🌊');}
function addSavings(){const v=parseInt(document.getElementById('sav-in')?.value||0);if(!v||v<=0)return;S.savings=Math.min((S.savings||0)+v,S.savingsGoal);saveS();evalAch();showToast(`💚 Saved ${fmtRp(v)} · ${Math.round(S.savings/S.savingsGoal*100)}% to L2D!`);renderMain();}
function addStream(){const t=document.getElementById('st-t')?.value.trim();if(!t)return;if(!S.streams)S.streams=[];S.streams.push({id:rnd(),title:t,views:parseInt(document.getElementById('st-v')?.value||0),note:document.getElementById('st-n')?.value.trim(),date:new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})});saveS();evalAch();renderMain();showToast('📺 Stream logged!');}
function delStream(id){S.streams=S.streams.filter(s=>s.id!=id);saveS();renderMain();}

function showLvlUp(lv){
  const r=LVR.find(x=>x.lv===lv);
  document.getElementById('m-spr').textContent=CR.spr;
  document.getElementById('m-ttl').textContent='✦ LEVEL UP ✦';
  document.getElementById('m-sub').textContent=`Level ${lv} — ${titleFor(lv)}!`;
  document.getElementById('m-rwd').textContent=r?r.t:`Keep going, ${CR.nm}! ✨`;
  document.getElementById('m-aff').textContent=AFFS[Math.floor(Math.random()*AFFS.length)];
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function undoQ(id){
  const q=S.quests.find(x=>x.id==id);if(!q)return;
  // Undo XP
  S.totalXp=Math.max(0,S.totalXp-q.xp);
  const isSk=SENSEI_SKILLS.find(s=>s.id===q.sk);
  if(isSk){if(S.sskills[q.sk])S.sskills[q.sk].xp=Math.max(0,(S.sskills[q.sk].xp||0)-q.xp);}
  else{if(S.skills[q.sk])S.skills[q.sk].xp=Math.max(0,(S.skills[q.sk].xp||0)-q.xp);}
  S.doneToday=Math.max(0,(S.doneToday||0)-1);
  // Undo completion
  if(q.type==='daily'||q.type==='habit')q.lastDone=null;else q.done=false;
  // Remove last log entry for this quest
  const li=S.log.map((l,i)=>l.nm===q.nm?i:-1).filter(i=>i>=0);
  if(li.length)S.log.splice(li[li.length-1],1);
  saveS();renderAll();showToast(`↩ Undone: ${q.nm.slice(0,30)}`);
}

<script>
// ── PWA: Register Service Worker ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── PWA: Install prompt ──
let _deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _deferredPrompt=e;
  // Show install banner after 3 seconds
  setTimeout(()=>{
    if(!localStorage.getItem('lq_installed')){
      showInstallBanner();
    }
  },3000);
});
window.addEventListener('appinstalled',()=>{
  localStorage.setItem('lq_installed','1');
  hideInstallBanner();
  showToast('✨ Life Quest installed!');
});

function showInstallBanner(){
  if(document.getElementById('install-banner'))return;
  const b=document.createElement('div');
  b.id='install-banner';
  b.style.cssText=`position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:#6c5ce7;color:white;border-radius:20px;padding:12px 20px;
    display:flex;align-items:center;gap:12px;z-index:9999;
    box-shadow:0 8px 24px rgba(108,92,231,.5);font-family:Nunito,sans-serif;
    animation:slideUp .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;`;
  b.innerHTML=`
    <span style="font-size:22px;">⚔️</span>
    <div>
      <div style="font-size:12px;font-weight:900;letter-spacing:.5px;">Install Life Quest</div>
      <div style="font-size:10px;opacity:.8;">Add to home screen as an app</div>
    </div>
    <button onclick="installPWA()" style="background:white;color:#6c5ce7;border:none;border-radius:12px;
      padding:7px 16px;font-size:12px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;">
      Install
    </button>
    <button onclick="hideInstallBanner()" style="background:rgba(255,255,255,.2);color:white;border:none;
      border-radius:10px;padding:7px 10px;font-size:12px;cursor:pointer;">✕</button>`;
  const style=document.createElement('style');
  style.textContent='@keyframes slideUp{from{transform:translateX(-50%) translateY(80px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}';
  document.head.appendChild(style);
  document.body.appendChild(b);
}

function hideInstallBanner(){
  const b=document.getElementById('install-banner');
  if(b)b.remove();
  localStorage.setItem('lq_installed','1');
}

async function installPWA(){
  if(!_deferredPrompt){
    showToast('Open in Chrome and use "Add to Home Screen" from the menu!');
    return;
  }
  _deferredPrompt.prompt();
  const{outcome}=await _deferredPrompt.userChoice;
  _deferredPrompt=null;
  if(outcome==='accepted')showToast('🎉 Installing Life Quest!');
  hideInstallBanner();
}
</script>
